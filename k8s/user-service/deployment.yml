apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: opentraum
  labels:
    app: user-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: user
    spec:
      containers:
        - name: user-service
          image: opentraum/user-service:latest
          ports:
            - containerPort: 8082
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://opentraum-postgres:5432/opentraum_user"
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
