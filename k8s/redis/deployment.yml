apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentraum-redis
  namespace: redis
  labels:
    app: opentraum-redis
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: cache
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: opentraum-redis
  template:
    metadata:
      labels:
        app: opentraum-redis
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: cache
    spec:
      # HOLD 락이 결제 흐름과 좌석 경합 처리에 쓰이므로 스케줄링 우선순위 상향
      priorityClassName: opentraum-high
      # 인프라끼리 모아서 배치
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - database
                        - messaging
                topologyKey: kubernetes.io/hostname
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "192Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
