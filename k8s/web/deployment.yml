apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: opentraum
  labels:
    app: web
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: harbor-registry-secret
      containers:
        - name: web
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-web:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
