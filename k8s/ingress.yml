apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opentraum-ingress
  namespace: opentraum
  labels:
    app.kubernetes.io/part-of: opentraum
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - skala3-cloud1-team8.cloud.skala-ai.com
      secretName: opentraum-tls
  rules:
    - host: skala3-cloud1-team8.cloud.skala-ai.com
      http:
        paths:
          # monitoring SSE — gateway 인증 우회 (시연용)
          # 운영 전환 시 cookie/query token 인증 + gateway 라우팅으로 통합 권장
          - path: /api/v1/monitoring
            pathType: Prefix
            backend:
              service:
                name: monitoring-service
                port:
                  number: 8086
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
