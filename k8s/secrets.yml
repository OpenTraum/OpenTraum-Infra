apiVersion: v1
kind: Secret
metadata:
  name: opentraum-secrets
  namespace: opentraum
  labels:
    app.kubernetes.io/part-of: opentraum
type: Opaque
stringData:
  DB_USERNAME: "opentraum"
  DB_PASSWORD: "opentraum"
  POSTGRES_PASSWORD: "opentraum"
  SPRING_R2DBC_USERNAME: "opentraum"
  SPRING_R2DBC_PASSWORD: "opentraum"
  JWT_SECRET: "opentraum-default-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256"
  # REDIS_PASSWORD 미설정 — Redis에 비밀번호 없으므로 환경변수를 주입하지 않음
