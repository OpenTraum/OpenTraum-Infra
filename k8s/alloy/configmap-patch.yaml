---
# Alloy ConfigMap (전체 덮어쓰기)
#
# 기존 Helm chart가 생성한 alloy ConfigMap을 완전히 대체합니다.
# Kubernetes Pod 로그 수집(Loki push) 블록만 정의합니다.
#
# 주의: 이 파일 apply 후 alloy DaemonSet/Deployment를 rollout restart 해야
#       새 config가 반영됩니다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: monitoring
data:
  config.alloy: |
    // ------------------------------------------------------------------
    // 기존: Kubernetes Pod log 수집 → Loki push
    // ------------------------------------------------------------------
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label  = "app"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
      }
    }
