apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opentraum-postgres
  namespace: opentraum
  labels:
    app: opentraum-postgres
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: database
spec:
  serviceName: opentraum-postgres
  replicas: 1
  selector:
    matchLabels:
      app: opentraum-postgres
  template:
    metadata:
      labels:
        app: opentraum-postgres
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: database
    spec:
      # Node 2 (거의 비어있음)에 배치 선호
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - ap-northeast-2b
        # Redis, Kafka와 같은 노드 선호 (인프라끼리 모음)
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - cache
                        - messaging
                topologyKey: kubernetes.io/hostname
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "opentraum"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opentraum-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "opentraum"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-db
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "opentraum"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "opentraum"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: init-db
          configMap:
            name: postgres-init-db
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ebs-sc
        resources:
          requests:
            storage: 5Gi
