apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: opentraum
  labels:
    app: reservation-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: reservation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: reservation
    spec:
      terminationGracePeriodSeconds: 35
      imagePullSecrets:
        - name: harbor-registry-secret
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      # reservation ↔ event 자주 통신하므로 같은 노드 선호
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - event-service
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: opentraum
      containers:
        - name: reservation-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-reservation-service:cfb2847
          ports:
            - containerPort: 8084
              protocol: TCP
          securityContext:
            runAsUser: 1000
            allowPrivilegeEscalation: false
          envFrom:
            - configMapRef:
                name: opentraum-config
            - secretRef:
                name: opentraum-secrets
          env:
            - name: DB_NAME
              value: "opentraum_reservation"
            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://opentraum-postgres:5432/opentraum_reservation"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
