---
# Allows the Strimzi-managed Kafka Connect pod to resolve connector config
# placeholders such as ${secrets:kafka/reservation-db-secret:mariadb-password}.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opentraum-debezium-connect-secret-reader
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: cdc
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - reservation-db-secret
      - payment-db-secret
      - event-db-secret
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opentraum-debezium-connect-secret-reader
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: cdc
subjects:
  - kind: ServiceAccount
    name: opentraum-debezium-connect-connect
    namespace: kafka
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opentraum-debezium-connect-secret-reader
