apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: opentraum
  labels:
    app: gateway
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
