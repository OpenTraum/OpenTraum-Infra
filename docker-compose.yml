# =============================================================================
# OpenTraum — Full Local Development Environment
# =============================================================================
# Usage: docker compose up -d
# All microservices + frontend + infrastructure for full integration testing
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: opentraum-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: opentraum
      POSTGRES_PASSWORD: opentraum
      POSTGRES_DB: opentraum
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentraum -d opentraum"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opentraum-net

  redis:
    image: redis:7-alpine
    container_name: opentraum-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - opentraum-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: opentraum-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opentraum-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: opentraum-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  # ---------------------------------------------------------------------------
  # Frontend (Vue 3 + Nginx)
  # ---------------------------------------------------------------------------
  web:
    image: opentraum/web:latest
    container_name: opentraum-web
    restart: unless-stopped
    build:
      context: ../OpenTraum-Web
      dockerfile: ../OpenTraum-Infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - opentraum-net

  # ---------------------------------------------------------------------------
  # Microservices
  # ---------------------------------------------------------------------------
  gateway:
    image: opentraum/gateway:latest
    container_name: opentraum-gateway
    restart: unless-stopped
    build:
      context: ../OpenTraum-gateway
      dockerfile: ../OpenTraum-Infra/docker/Dockerfile.spring
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # JWT (auth-service와 동일)
      JWT_SECRET: opentraum-default-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
      # Gateway 라우팅 (환경변수 기반)
      SPRING_CLOUD_GATEWAY_ROUTES_0_ID: auth-service
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://auth-service:8081
      SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0: Path=/api/v1/auth/**
      SPRING_CLOUD_GATEWAY_ROUTES_1_ID: user-service
      SPRING_CLOUD_GATEWAY_ROUTES_1_URI: http://user-service:8082
      SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0: Path=/api/v1/users/**,/api/v1/tenants/**
      SPRING_CLOUD_GATEWAY_ROUTES_2_ID: event-service
      SPRING_CLOUD_GATEWAY_ROUTES_2_URI: http://event-service:8083
      SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0: Path=/api/v1/concerts/**,/api/v1/schedules/**,/api/v1/admin/seats/**
      SPRING_CLOUD_GATEWAY_ROUTES_3_ID: reservation-service
      SPRING_CLOUD_GATEWAY_ROUTES_3_URI: http://reservation-service:8084
      SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0: Path=/api/v1/reservations/**,/api/v1/queue/**,/api/v1/live/**,/api/v1/lottery/**
      SPRING_CLOUD_GATEWAY_ROUTES_4_ID: payment-service
      SPRING_CLOUD_GATEWAY_ROUTES_4_URI: http://payment-service:8085
      SPRING_CLOUD_GATEWAY_ROUTES_4_PREDICATES_0: Path=/api/v1/payment/**
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  auth-service:
    image: opentraum/auth-service:latest
    container_name: opentraum-auth-service
    restart: unless-stopped
    build:
      context: ../OpenTraum-auth-service
      dockerfile: ../OpenTraum-Infra/docker/Dockerfile.spring
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      # R2DBC (WebFlux 기반 — JDBC 아님)
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/opentraum_auth
      SPRING_R2DBC_USERNAME: opentraum
      SPRING_R2DBC_PASSWORD: opentraum
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: opentraum_auth
      DB_USERNAME: opentraum
      DB_PASSWORD: opentraum
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # JWT
      JWT_SECRET: opentraum-default-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  user-service:
    image: opentraum/user-service:latest
    container_name: opentraum-user-service
    restart: unless-stopped
    build:
      context: ../OpenTraum-user-service
      dockerfile: ../OpenTraum-Infra/docker/Dockerfile.spring
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/opentraum_user
      SPRING_R2DBC_USERNAME: opentraum
      SPRING_R2DBC_PASSWORD: opentraum
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: opentraum_user
      DB_USERNAME: opentraum
      DB_PASSWORD: opentraum
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  event-service:
    image: opentraum/event-service:latest
    container_name: opentraum-event-service
    restart: unless-stopped
    build:
      context: ../OpenTraum-event-service
      dockerfile: ../OpenTraum-Infra/docker/Dockerfile.spring
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/opentraum_event
      SPRING_R2DBC_USERNAME: opentraum
      SPRING_R2DBC_PASSWORD: opentraum
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: opentraum_event
      DB_USERNAME: opentraum
      DB_PASSWORD: opentraum
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  reservation-service:
    image: opentraum/reservation-service:latest
    container_name: opentraum-reservation-service
    restart: unless-stopped
    build:
      context: ../OpenTraum-reservation-service
      dockerfile: ../OpenTraum-Infra/docker/Dockerfile.spring
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/opentraum_reservation
      SPRING_R2DBC_USERNAME: opentraum
      SPRING_R2DBC_PASSWORD: opentraum
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: opentraum_reservation
      DB_USERNAME: opentraum
      DB_PASSWORD: opentraum
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # 서비스 간 통신
      EVENT_SERVICE_URL: http://event-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  payment-service:
    image: opentraum/payment-service:latest
    container_name: opentraum-payment-service
    restart: unless-stopped
    build:
      context: ../OpenTraum-payment-service
      dockerfile: ../OpenTraum-Infra/docker/Dockerfile.spring
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/opentraum_payment
      SPRING_R2DBC_USERNAME: opentraum
      SPRING_R2DBC_PASSWORD: opentraum
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: opentraum_payment
      DB_USERNAME: opentraum
      DB_PASSWORD: opentraum
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

# =============================================================================
# Networks & Volumes
# =============================================================================
networks:
  opentraum-net:
    driver: bridge
    name: opentraum-net

volumes:
  postgres-data:
    name: opentraum-postgres-data
  redis-data:
    name: opentraum-redis-data
  zookeeper-data:
    name: opentraum-zookeeper-data
  zookeeper-logs:
    name: opentraum-zookeeper-logs
  kafka-data:
    name: opentraum-kafka-data
