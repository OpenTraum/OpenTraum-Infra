version: "3.9"

# =============================================================================
# OpenTraum — Full Local Development Environment
# =============================================================================
# Usage: docker compose up -d
# All microservices + infrastructure for full integration testing
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: opentraum-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: opentraum
      POSTGRES_PASSWORD: opentraum
      POSTGRES_DB: opentraum
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentraum -d opentraum"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opentraum-net

  redis:
    image: redis:7-alpine
    container_name: opentraum-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - opentraum-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: opentraum-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opentraum-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: opentraum-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  # ---------------------------------------------------------------------------
  # Microservices
  # ---------------------------------------------------------------------------
  gateway:
    image: opentraum/gateway:latest
    container_name: opentraum-gateway
    restart: unless-stopped
    build:
      context: ../OpenTraum-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_GATEWAY_ROUTES: ""
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      EVENT_SERVICE_URL: http://event-service:8083
      RESERVATION_SERVICE_URL: http://reservation-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  auth-service:
    image: opentraum/auth-service:latest
    container_name: opentraum-auth-service
    restart: unless-stopped
    build:
      context: ../OpenTraum-auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opentraum_auth
      SPRING_DATASOURCE_USERNAME: opentraum
      SPRING_DATASOURCE_PASSWORD: opentraum
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  user-service:
    image: opentraum/user-service:latest
    container_name: opentraum-user-service
    restart: unless-stopped
    build:
      context: ../OpenTraum-user-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opentraum_user
      SPRING_DATASOURCE_USERNAME: opentraum
      SPRING_DATASOURCE_PASSWORD: opentraum
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  event-service:
    image: opentraum/event-service:latest
    container_name: opentraum-event-service
    restart: unless-stopped
    build:
      context: ../OpenTraum-event-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opentraum_event
      SPRING_DATASOURCE_USERNAME: opentraum
      SPRING_DATASOURCE_PASSWORD: opentraum
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  reservation-service:
    image: opentraum/reservation-service:latest
    container_name: opentraum-reservation-service
    restart: unless-stopped
    build:
      context: ../OpenTraum-reservation-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opentraum_reservation
      SPRING_DATASOURCE_USERNAME: opentraum
      SPRING_DATASOURCE_PASSWORD: opentraum
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

  payment-service:
    image: opentraum/payment-service:latest
    container_name: opentraum-payment-service
    restart: unless-stopped
    build:
      context: ../OpenTraum-payment-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opentraum_payment
      SPRING_DATASOURCE_USERNAME: opentraum
      SPRING_DATASOURCE_PASSWORD: opentraum
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - opentraum-net

# =============================================================================
# Networks & Volumes
# =============================================================================
networks:
  opentraum-net:
    driver: bridge
    name: opentraum-net

volumes:
  postgres-data:
    name: opentraum-postgres-data
  redis-data:
    name: opentraum-redis-data
  zookeeper-data:
    name: opentraum-zookeeper-data
  zookeeper-logs:
    name: opentraum-zookeeper-logs
  kafka-data:
    name: opentraum-kafka-data
