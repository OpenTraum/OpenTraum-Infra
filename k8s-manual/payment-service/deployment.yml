---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: opentraum
  labels:
    app: payment-service
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: payment
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        app.kubernetes.io/name: payment-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: payment
    spec:
      # payment-service application.yml: lifecycle.timeout-per-shutdown-phase=30s → 버퍼 포함 40s
      terminationGracePeriodSeconds: 40
      imagePullSecrets:
        - name: harbor-secret
      priorityClassName: opentraum-high
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [reservation-service, payment-service, event-service]
                topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: [payment-service]
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: opentraum
      containers:
        - name: payment-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/team8-opentraum-payment:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: SPRING_R2DBC_URL
              value: "r2dbc:mysql://payment-db.kafka:3306/payment"
            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: mariadb-user
            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: mariadb-password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "my-kafka-cluster-kafka-bootstrap.kafka:9092"
            - name: OTLP_TRACING_ENDPOINT
              value: "http://alloy-otlp.monitoring:4318/v1/traces"
            # mock profile: 수동 배포 기본값은 PortOne Mock 사용 (실 PG 호출 차단).
            # 실 PG 를 붙일 때는 mock 을 빼고 prod 만 활성화.
            - name: SPRING_PROFILES_ACTIVE
              value: "prod,mock"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "false"  # Kafka listener 는 eager init 필수 (트러블슈팅 #29)
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Probe 제거: 이유는 event-service deployment.yml 주석 참고.
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: opentraum
  labels:
    app: payment-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: payment
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8085
      targetPort: 8085
      protocol: TCP
