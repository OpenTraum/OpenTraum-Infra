---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: opentraum
  labels:
    app: web
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: web
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: harbor-secret
      priorityClassName: opentraum-low
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: web
      containers:
        - name: web
          image: amdp-registry.skala-ai.com/skala26a-cloud/team8-opentraum-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: opentraum
  labels:
    app: web
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
