---
# auth-service DB credentials
# - 실 운영에선 SealedSecret / SOPS / 외부 Secret Store 사용 권장
# - 지금은 실습 편의상 stringData 평문. Git에 커밋하지 말 것 (.gitignore 관리).
apiVersion: v1
kind: Secret
metadata:
  name: auth-db-secret
  namespace: opentraum
  labels:
    app: auth-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  username: "opentraum"
  password: "opentraum123!"
