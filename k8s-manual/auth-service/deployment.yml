---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: opentraum
  labels:
    app: auth-service
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: auth
    spec:
      terminationGracePeriodSeconds: 40
      imagePullSecrets:
        - name: harbor-secret
      priorityClassName: opentraum-medium
      containers:
        - name: auth-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/team8-opentraum-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            # develop 브랜치 기준 MariaDB 사용 (build.gradle: r2dbc-mysql 1.1.0)
            # application.yml 이 r2dbc:mysql URL 템플릿 + DB_* env 를 읽음 → 둘 다 설정.
            - name: DB_HOST
              value: "opentraum-mariadb.mariadb"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "opentraum_auth"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: password
            - name: SPRING_R2DBC_URL
              value: "r2dbc:mysql://opentraum-mariadb.mariadb:3306/opentraum_auth"
            - name: REDIS_HOST
              value: "opentraum-redis.redis"
            - name: REDIS_PORT
              value: "6379"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1024Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: opentraum
  labels:
    app: auth-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: auth
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP
