---
# Gateway — 트래픽 진입점이므로 롤링 업데이트 시 최소 가용성 보장
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: opentraum
  labels:
    app.kubernetes.io/part-of: opentraum
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: gateway
---
# CDC용 서비스 DB (kafka ns) — replicas=1 이므로 maxUnavailable=0 으로 두면 노드 drain 이 막힌다.
# 따라서 maxUnavailable=1 (=단일 Pod이라도 voluntary disruption 허용)로 두고, 대신
# PVC 덕분에 Pod가 다른 노드로 재스케줄되어도 데이터는 유지된다.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: reservation-db-pdb
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: opentraum
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: reservation-db
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-db-pdb
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: opentraum
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: payment-db
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: event-db-pdb
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: opentraum
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: event-db
---
# Strimzi Kafka (my-kafka-cluster @ kafka ns) — Strimzi operator 가 자체 PDB 관리하므로 별도 정의 불필요.
# 필요 시 Kafka CR spec.kafka.template.podDisruptionBudget 으로 설정.
