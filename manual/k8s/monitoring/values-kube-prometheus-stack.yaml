# kube-prometheus-stack values.yaml
#
# Helm release: kube-prometheus-stack (chart 84.4.0, app v0.90.1)
# 설치 ns: monitoring
#
# 주요 변경 (2026-04-22):
# - prometheus/alertmanager/grafana/operator 에 topologySpreadConstraints 추가
# - 6노드 중 특정 노드 (156-206) 로의 집중 방지
# - maxSkew=1 + ScheduleAnyway 로 강제 아니지만 스케줄러 우선순위 힌트
#
# 적용:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --version 84.4.0 -n monitoring -f values-kube-prometheus-stack.yaml

# ===== Prometheus =====
prometheus:
  ingress:
    enabled: true
    hosts:
      - prometheus
    ingressClassName: nginx
    pathType: Prefix
    paths:
      - /prometheus
  prometheusSpec:
    externalUrl: /prometheus
    routePrefix: /prometheus
    # 노드 자원 압박 시 운영 서비스보다 먼저 evict (06 §2)
    priorityClassName: opentraum-best-effort
    # 노드 분산용 공통 라벨 (mariadb / loki 와 cross anti-affinity)
    podMetadata:
      labels:
        opentraum.io/heavy: "true"
    # chart 기본 self-only podAntiAffinity 비활성화 (단일 replica 라 무효 + 아래 cross affinity 와 키 충돌 방지)
    podAntiAffinity: ""
    # 노드 분산
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
    # 무거운 인프라 pod 끼리 서로 다른 노드로 분산 (mariadb / loki 와 cross).
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  opentraum.io/heavy: "true"
              topologyKey: kubernetes.io/hostname
    # 리소스
    resources:
      requests:
        memory: 512Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 500m
    # retention 조정 (디스크 절약)
    retention: 7d

# ===== Alertmanager =====
alertmanager:
  alertmanagerSpec:
    # 노드 자원 압박 시 운영 서비스보다 먼저 evict (06 §2)
    priorityClassName: opentraum-best-effort
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: alertmanager
    resources:
      requests:
        memory: 64Mi
        cpu: 10m
      limits:
        memory: 128Mi
        cpu: 100m

# ===== Grafana =====
# NOTE: grafana.adminPassword is provided at install time via -f values-kube-prometheus-stack-secret.yaml.
# See values-kube-prometheus-stack-secret.example.yaml for the expected structure.
grafana:
  # 노드 자원 압박 시 운영 서비스보다 먼저 evict (06 §2)
  priorityClassName: opentraum-best-effort
  ingress:
    enabled: true
    ingressClassName: nginx
  sidecar:
    datasources:
      enabled: true
  additionalDataSources:
    - access: proxy
      isDefault: "false"
      name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: grafana
  resources:
    requests:
      memory: 192Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 300m

# ===== Operator =====
prometheusOperator:
  # 노드 자원 압박 시 운영 서비스보다 먼저 evict (06 §2)
  priorityClassName: opentraum-best-effort
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: kube-prometheus-stack-operator
  resources:
    requests:
      memory: 64Mi
      cpu: 10m
    limits:
      memory: 256Mi
      cpu: 200m

# ===== kube-state-metrics =====
kube-state-metrics:
  # 노드 자원 압박 시 운영 서비스보다 먼저 evict (06 §2)
  priorityClassName: opentraum-best-effort
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: kube-state-metrics
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 128Mi
      cpu: 100m
